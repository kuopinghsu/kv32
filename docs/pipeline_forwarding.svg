      .forward-path { stroke: #d32f2f; stroke-width: 3; fill: none; stroke-dasharray: 5,5; }
      .data-path { stroke: #424242; stroke-width: 2; fill: none; }
      .arrow { fill: #424242; }
      .forward-arrow { fill: #d32f2f; }
      .label { font-size: 14px; fill: #333; font-family: Arial, sans-serif; }
      .stage-label { font-size: 16px; font-weight: bold; fill: #1976d2; font-family: Arial, sans-serif; }
      .note { font-size: 12px; fill: #666; font-style: italic; }
