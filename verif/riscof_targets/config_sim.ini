# RISCOF Configuration for kv32sim Validation
# DUT: kv32sim (kv32 software simulator)
# REF: spike (official RISC-V ISA simulator)
# This config validates kv32sim against spike

[RISCOF]
ReferencePlugin=spike
ReferencePluginPath=spike
DUTPlugin=kv32sim
DUTPluginPath=kv32sim

[kv32]
pluginpath=kv32
ispec=kv32/kv32_isa.yaml
pspec=kv32/kv32_platform.yaml

[spike]
pluginpath=spike
ispec=spike/spike_isa.yaml
pspec=spike/spike_platform.yaml

[kv32sim]
pluginpath=kv32sim
ispec=kv32sim/kv32sim_isa.yaml
pspec=kv32sim/kv32sim_platform.yaml
target_run=1
