# RISCOF Configuration for rv32 Validation
# DUT: rv32 (rv32 RTL simulator)
# REF: spike (official RISC-V ISA simulator)
# This config validates rv32 against spike

[RISCOF]
ReferencePlugin=spike
ReferencePluginPath=spike
DUTPlugin=rv32
DUTPluginPath=rv32

[rv32]
pluginpath=rv32
ispec=rv32/rv32_isa.yaml
pspec=rv32/rv32_platform.yaml
target_run=1

[spike]
pluginpath=spike
ispec=spike/spike_isa.yaml
pspec=spike/spike_platform.yaml

[rv32sim]
pluginpath=rv32sim
ispec=rv32sim/rv32sim_isa.yaml
pspec=rv32sim/rv32sim_platform.yaml
