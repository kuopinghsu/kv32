# svlint configuration for kv32 RV32IMAC SoC
# Based on /opt/svlint/bin/designintent.toml with two project-specific exceptions.
# All rules below match designintent.toml exactly unless annotated otherwise.

# ── Simulation / synthesis consistency ─────────────────────────────────────
syntaxrules.blocking_assignment_in_always_ff = true

# NOTE: blocking_assignment_in_always_latch is intentionally NOT enabled.
# Clock-gate latches (always_latch if (!clk) latch_en = ...) require blocking
# assignment = because the output must track the input transparently.
# Using <= triggers Verilator COMBDLY; both tools treat it as = anyway.
# This is the one divergence from designintent.toml.

syntaxrules.non_blocking_assignment_in_always_comb = true
syntaxrules.case_default = true
syntaxrules.enum_with_type = true
syntaxrules.function_with_automatic = true
syntaxrules.keyword_forbidden_priority = true
syntaxrules.keyword_forbidden_unique   = true
syntaxrules.keyword_forbidden_unique0  = true
syntaxrules.operator_case_equality = true
syntaxrules.procedural_continuous_assignment = true
syntaxrules.action_block_with_side_effect = true

# ── Design-intent rules (from designintent.toml) ───────────────────────────
syntaxrules.function_same_as_system_function = true
syntaxrules.keyword_forbidden_always     = true
syntaxrules.module_nonansi_forbidden     = true

# NOTE: default_nettype_none is intentionally NOT enabled.
# kv32_rvc.sv guards it with `ifndef SYNTHESIS; other files to be migrated
# incrementally as a separate effort.

# Forbid implicit-typed localparams/parameters; require two-state base types.
# localparam_explicit_type and localparam_type_twostate disabled: would require
# explicit type annotations on every localparam across the entire codebase
# (62 and 26 violations respectively).  parameter_explicit_type and
# parameter_type_twostate are kept enabled and violations are fixed in RTL.
syntaxrules.localparam_type_twostate    = false
syntaxrules.parameter_type_twostate     = true
syntaxrules.localparam_explicit_type    = false
syntaxrules.parameter_explicit_type     = true
syntaxrules.parameter_default_value     = true
syntaxrules.parameter_in_generate       = true
syntaxrules.parameter_in_package        = true

# genvar: require declaration inside the for loop (out-loop forbidden).
# Disabled: axi_gpio.sv and other peripheral files declare genvar outside
# the loop using the older SV-2005 style; changing all instances is invasive.
syntaxrules.genvar_declaration_in_loop  = false
syntaxrules.genvar_declaration_out_loop = false

# Forbid redundant 'generate'/'endgenerate' keywords.
# Disabled: already removed from all core files during initial cleanup;
# remaining instances are in peripheral files that would require many edits.
syntaxrules.keyword_forbidden_generate  = false
syntaxrules.keyword_required_generate   = false

# Require explicit else/default on every if and case.
syntaxrules.explicit_case_default = true
# explicit_if_else disabled: many legitimate one-sided ifs (reset-only paths,
# debug-only blocks) do not merit a synthesisable else branch.
syntaxrules.explicit_if_else      = false

# Forbid loop statements inside always blocks.
# Disabled: for-loops inside always_ff / always_comb are idiomatic for array
# initialisation, shift registers, and reduction operations in this codebase.
syntaxrules.loop_statement_in_always_comb  = false
syntaxrules.loop_statement_in_always_ff    = false
syntaxrules.loop_statement_in_always_latch = false

# Forbid sequential blocks (begin/end) inside always blocks.
# Disabled: begin/end in always_ff/comb/latch is standard practice and
# required for multi-statement bodies; the rule is too strict for this style.
syntaxrules.sequential_block_in_always_comb  = false
syntaxrules.sequential_block_in_always_ff    = false
syntaxrules.sequential_block_in_always_latch = false

# Require begin/end for multi-line for/if bodies.
# Disabled: ~91 violations across the codebase; adding begin/end to every
# single-statement if/for body is excessively invasive for the safety benefit.
syntaxrules.multiline_for_begin = false
syntaxrules.multiline_if_begin  = false

# Port direction / type conventions.
# input_with_var / output_with_var require 'var' datakind on every port
# (e.g. 'input var logic').  While technically correct, this convention is
# not universally adopted; adding 'var' to every port in the codebase is
# too invasive for the benefit it provides.
# keyword_forbidden_wire_reg disabled: ~43 violations; many files use 'wire'
# for combinational assignments (wire x = a & b), which is idiomatic and
# correct.  Changing all instances to 'logic' is invasive.
syntaxrules.keyword_forbidden_wire_reg  = false
syntaxrules.inout_with_tri              = true
syntaxrules.input_with_var              = false
syntaxrules.output_with_var             = false
syntaxrules.interface_port_with_modport = true

# generate_if_with_label requires labels prefixed with 'l_'.
# generate_for_with_label disabled alongside it: renaming existing labels
# (gen_*, g_*) would break hierarchical path references in the testbench.
syntaxrules.generate_if_with_label  = false
syntaxrules.generate_for_with_label = false
syntaxrules.generate_case_with_label = true
